<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmar e-mail — Dona Rosa</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f0e6;font-family:'Lato',Arial,Helvetica,sans-serif;color:#464039;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f5f0e6;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background-color:#fdfbf3;border-radius:12px;border:1px solid #ddd5c8;overflow:hidden;">
          <tr>
            <td style="background-color:#4f6559;padding:28px 32px;text-align:center;">
              <img src="https://www.donarosa.com.br/images/logo-small.png" alt="Dona Rosa" width="48" style="display:inline-block;vertical-align:middle;margin-right:8px;" />
              <span style="font-family:'Montserrat','Lato',Arial,sans-serif;font-size:20px;font-weight:600;color:#fdfbf3;vertical-align:middle;">Dona Rosa</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <h1 style="margin:0 0 16px;font-family:'Montserrat','Lato',Arial,sans-serif;font-size:22px;font-weight:700;color:#4f6559;">
                Confirme seu e-mail
              </h1>
              <p style="margin:0 0 24px;font-size:16px;line-height:1.6;color:#464039;">
                Falta só um passo: confirme que este endereço é seu para concluir o cadastro no painel da Dona Rosa.
              </p>
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 24px;">
                <tr>
                  <td style="border-radius:8px;background-color:#4f6559;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 28px;font-family:'Montserrat','Lato',Arial,sans-serif;font-size:16px;font-weight:600;color:#fdfbf3;text-decoration:none;border-radius:8px;">
                      Confirmar e-mail
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:0;font-size:14px;line-height:1.5;color:#6b635a;">
                Se você não criou uma conta, ignore este e-mail.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px 28px;border-top:1px solid #ddd5c8;background-color:#faf7ef;text-align:center;">
              <p style="margin:0;font-size:12px;color:#9a9288;">{{ .Email }}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
